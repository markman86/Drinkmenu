<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>Cocktail Order – TRMNL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 480px;
    background: #fff;
    display: flex;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* Divider */
  .divider {
    width: 3px;
    height: 100%;
    background: #000;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  /* Panels */
  .panel {
    width: 398px;
    height: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }

  .panel-left { background: #fff; }
  .panel-right { background: #fff; }

  /* Top label */
  .order-tag {
    position: absolute;
    top: 14px;
    left: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #000;
    border: 1.5px solid #000;
    padding: 3px 8px;
  }

  /* Drink number */
  .drink-num {
    position: absolute;
    top: 14px;
    right: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: #000;
  }

  /* SVG graphic */
  .glass-wrap {
    margin-bottom: 20px;
  }

  /* Name */
  .drink-name {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    color: #000;
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1;
    text-transform: uppercase;
  }

  .drink-name.long {
    font-size: 28px;
    letter-spacing: -0.02em;
  }

  /* Decorative bottom line */
  .underline-deco {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .underline-deco span {
    display: block;
    height: 2px;
    background: #000;
  }
  .underline-deco .long { width: 48px; }
  .underline-deco .short { width: 12px; }
  .underline-deco .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #000;
  }

  /* Ingredients line */
  .ingredients {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #000;
    text-align: center;
    opacity: 0.65;
  }

  /* Bottom border */
  .bottom-rule {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: #000;
  }

  /* Top border */
  .top-rule {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: #000;
  }
</style>
</head>
<body>

<!-- MOJITO -->
<div class="panel panel-left">
  <div class="top-rule"></div>
  <div class="order-tag">Order 01</div>
  <div class="drink-num">#1</div>

  <div class="glass-wrap">
    <!-- Mojito SVG: tall highball glass with ice, mint, straw -->
    <svg width="130" height="200" viewBox="0 0 130 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Glass body -->
      <path d="M28 30 L102 30 L93 178 L37 178 Z" fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
      <!-- Glass rim highlight -->
      <line x1="28" y1="30" x2="102" y2="30" stroke="#000" stroke-width="3"/>
      <!-- Liquid fill (dithered look via hatching) -->
      <clipPath id="glassClip">
        <path d="M30 50 L100 50 L92 175 L38 175 Z"/>
      </clipPath>
      <g clip-path="url(#glassClip)">
        <!-- Light fill background -->
        <rect x="28" y="50" width="74" height="127" fill="#f0f0f0"/>
        <!-- Diagonal hatch for texture -->
        <line x1="28" y1="80" x2="60" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="28" y1="100" x2="80" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="28" y1="120" x2="100" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="36" y1="140" x2="100" y2="76" stroke="#ccc" stroke-width="1.2"/>
        <line x1="42" y1="158" x2="100" y2="100" stroke="#ccc" stroke-width="1.2"/>
        <line x1="48" y1="175" x2="100" y2="123" stroke="#ccc" stroke-width="1.2"/>
        <line x1="60" y1="175" x2="100" y2="145" stroke="#ccc" stroke-width="1.2"/>
        <line x1="75" y1="175" x2="100" y2="163" stroke="#ccc" stroke-width="1.2"/>
      </g>

      <!-- Ice cubes -->
      <rect x="38" y="100" width="22" height="20" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <rect x="68" y="108" width="20" height="18" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <rect x="50" y="125" width="24" height="20" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>

      <!-- Mint leaves cluster at top -->
      <ellipse cx="52" cy="36" rx="12" ry="8" fill="#333" transform="rotate(-20 52 36)"/>
      <ellipse cx="68" cy="33" rx="13" ry="7" fill="#555" transform="rotate(10 68 33)"/>
      <ellipse cx="60" cy="28" rx="10" ry="6" fill="#444" transform="rotate(-5 60 28)"/>
      <!-- Mint veins -->
      <line x1="48" y1="38" x2="58" y2="30" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
      <line x1="64" y1="35" x2="74" y2="27" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
      <!-- Stem -->
      <line x1="60" y1="40" x2="60" y2="55" stroke="#000" stroke-width="1.5"/>

      <!-- Straw -->
      <rect x="82" y="22" width="5" height="120" rx="2.5" fill="#000"/>
      <!-- Straw dashes (striped look) -->
      <rect x="82" y="30" width="5" height="10" rx="0" fill="#fff"/>
      <rect x="82" y="50" width="5" height="10" rx="0" fill="#fff"/>
      <rect x="82" y="70" width="5" height="10" rx="0" fill="#fff"/>
      <rect x="82" y="90" width="5" height="10" rx="0" fill="#fff"/>
      <rect x="82" y="110" width="5" height="10" rx="0" fill="#fff"/>

      <!-- Lime wheel on rim -->
      <circle cx="30" cy="34" r="11" fill="#fff" stroke="#000" stroke-width="2"/>
      <line x1="30" y1="23" x2="30" y2="45" stroke="#000" stroke-width="1"/>
      <line x1="19" y1="34" x2="41" y2="34" stroke="#000" stroke-width="1"/>
      <line x1="22" y1="26" x2="38" y2="42" stroke="#000" stroke-width="1"/>
      <line x1="22" y1="42" x2="38" y2="26" stroke="#000" stroke-width="1"/>

      <!-- Base of glass -->
      <rect x="34" y="178" width="62" height="8" rx="3" fill="#000"/>
    </svg>
  </div>

  <div class="drink-name">Mojito</div>
  <div class="underline-deco">
    <span class="long"></span>
    <span class="dot"></span>
    <span class="short"></span>
  </div>
  <div class="ingredients">Rum · Lime · Mint · Soda</div>

  <div class="bottom-rule"></div>
</div>

<!-- DIVIDER -->
<div class="divider"></div>

<!-- APEROL SPRITZ -->
<div class="panel panel-right">
  <div class="top-rule"></div>
  <div class="order-tag">Order 02</div>
  <div class="drink-num">#2</div>

  <div class="glass-wrap">
    <!-- Aperol Spritz SVG: wine/spritz goblet with bubbles, orange slice -->
    <svg width="130" height="200" viewBox="0 0 130 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Goblet bowl -->
      <path d="M22 28 L108 28 L88 130 L72 130 L72 168 L58 168 L58 130 L42 130 Z"
            fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
      <!-- Rim -->
      <line x1="22" y1="28" x2="108" y2="28" stroke="#000" stroke-width="3"/>

      <!-- Liquid fill -->
      <clipPath id="gobletClip">
        <path d="M25 50 L105 50 L87 128 L43 128 Z"/>
      </clipPath>
      <g clip-path="url(#gobletClip)">
        <!-- Fill background -->
        <rect x="22" y="50" width="86" height="82" fill="#e8e8e8"/>
        <!-- Dot pattern for texture (bubble feel) -->
        <circle cx="38" cy="65" r="3" fill="#fff"/>
        <circle cx="55" cy="75" r="2.5" fill="#fff"/>
        <circle cx="72" cy="60" r="3" fill="#fff"/>
        <circle cx="88" cy="72" r="2" fill="#fff"/>
        <circle cx="45" cy="90" r="2" fill="#fff"/>
        <circle cx="62" cy="100" r="3" fill="#fff"/>
        <circle cx="80" cy="88" r="2.5" fill="#fff"/>
        <circle cx="34" cy="110" r="2" fill="#fff"/>
        <circle cx="92" cy="105" r="2" fill="#fff"/>
        <circle cx="65" cy="118" r="2" fill="#fff"/>
        <!-- Rising bubbles -->
        <circle cx="50" cy="58" r="1.5" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
        <circle cx="75" cy="52" r="1.5" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
        <circle cx="63" cy="70" r="1.2" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
        <circle cx="85" cy="62" r="1.2" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
        <circle cx="40" cy="80" r="1.5" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
      </g>

      <!-- Ice cubes in goblet -->
      <rect x="46" y="95" width="18" height="16" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <rect x="68" y="100" width="16" height="15" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>

      <!-- Orange slice on rim -->
      <circle cx="112" cy="38" r="16" fill="#fff" stroke="#000" stroke-width="2.5"/>
      <!-- Orange segments -->
      <line x1="112" y1="22" x2="112" y2="54" stroke="#000" stroke-width="1.2"/>
      <line x1="96" y1="38" x2="128" y2="38" stroke="#000" stroke-width="1.2"/>
      <line x1="100" y1="27" x2="124" y2="49" stroke="#000" stroke-width="1.2"/>
      <line x1="100" y1="49" x2="124" y2="27" stroke="#000" stroke-width="1.2"/>
      <!-- Orange rind arc -->
      <circle cx="112" cy="38" r="13" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
      <!-- Notch on glass rim -->
      <line x1="100" y1="28" x2="112" y2="28" stroke="#fff" stroke-width="3"/>

      <!-- Stem -->
      <rect x="61" y="130" width="8" height="38" fill="#000" rx="2"/>

      <!-- Base -->
      <rect x="38" y="168" width="54" height="9" rx="4" fill="#000"/>

      <!-- Straw (minimal, thin) -->
      <line x1="44" y1="25" x2="56" y2="130" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="drink-name long">Aperol Spritz</div>
  <div class="underline-deco">
    <span class="short"></span>
    <span class="dot"></span>
    <span class="long"></span>
  </div>
  <div class="ingredients">Aperol · Prosecco · Soda</div>

  <div class="bottom-rule"></div>
</div>

</body>
</html>
