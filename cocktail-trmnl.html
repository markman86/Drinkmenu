<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>Cocktail Order</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 480px;
    background: #fff;
    display: flex;
    font-family: Georgia, 'Times New Roman', Times, serif;
    overflow: hidden;
  }

  .divider {
    width: 3px;
    height: 100%;
    background: #000;
    flex-shrink: 0;
  }

  .panel {
    width: 398px;
    height: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  .order-tag {
    position: absolute;
    top: 14px;
    left: 16px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #000;
    border: 1.5px solid #000;
    padding: 3px 8px;
  }

  .drink-num {
    position: absolute;
    top: 14px;
    right: 16px;
    font-family: Georgia, serif;
    font-size: 13px;
    font-weight: bold;
    color: #000;
  }

  .glass-wrap { margin-bottom: 18px; }

  .drink-name {
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-size: 42px;
    font-weight: bold;
    color: #000;
    text-align: center;
    line-height: 1;
    text-transform: uppercase;
  }

  .drink-name.long { font-size: 28px; }

  .underline-deco {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .underline-deco span { display: block; height: 2px; background: #000; }
  .underline-deco .long { width: 48px; }
  .underline-deco .short { width: 14px; }
  .underline-deco .dot { width: 5px; height: 5px; border-radius: 50%; background: #000; }

  .ingredients {
    margin-top: 9px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #000;
    text-align: center;
  }

  .top-rule { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #000; }
  .bottom-rule { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #000; }
</style>
</head>
<body>

<!-- MOJITO -->
<div class="panel">
  <div class="top-rule"></div>
  <div class="order-tag">Order 01</div>
  <div class="drink-num">#1</div>
  <div class="glass-wrap">
    <svg width="120" height="195" viewBox="0 0 120 195" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 28 L98 28 L88 175 L32 175 Z" fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
      <clipPath id="mc"><path d="M24 50 L96 50 L87 173 L33 173 Z"/></clipPath>
      <g clip-path="url(#mc)">
        <rect x="22" y="50" width="76" height="125" fill="#ebebeb"/>
        <line x1="22" y1="75" x2="55" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="22" y1="95" x2="75" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="22" y1="115" x2="95" y2="50" stroke="#ccc" stroke-width="1.2"/>
        <line x1="30" y1="135" x2="96" y2="72" stroke="#ccc" stroke-width="1.2"/>
        <line x1="36" y1="155" x2="96" y2="97" stroke="#ccc" stroke-width="1.2"/>
        <line x1="42" y1="173" x2="96" y2="122" stroke="#ccc" stroke-width="1.2"/>
        <line x1="58" y1="173" x2="96" y2="142" stroke="#ccc" stroke-width="1.2"/>
      </g>
      <rect x="33" y="98" width="22" height="20" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <rect x="62" y="106" width="20" height="18" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <rect x="44" y="124" width="24" height="20" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <ellipse cx="46" cy="34" rx="13" ry="8" fill="#333" transform="rotate(-18 46 34)"/>
      <ellipse cx="63" cy="31" rx="13" ry="7" fill="#555" transform="rotate(12 63 31)"/>
      <ellipse cx="56" cy="26" rx="10" ry="6" fill="#444" transform="rotate(-4 56 26)"/>
      <line x1="56" y1="38" x2="56" y2="52" stroke="#000" stroke-width="1.5"/>
      <rect x="78" y="20" width="5" height="118" rx="2.5" fill="#000"/>
      <rect x="78" y="28" width="5" height="9" fill="#fff"/>
      <rect x="78" y="47" width="5" height="9" fill="#fff"/>
      <rect x="78" y="66" width="5" height="9" fill="#fff"/>
      <rect x="78" y="85" width="5" height="9" fill="#fff"/>
      <rect x="78" y="104" width="5" height="9" fill="#fff"/>
      <circle cx="24" cy="32" r="11" fill="#fff" stroke="#000" stroke-width="2"/>
      <line x1="24" y1="21" x2="24" y2="43" stroke="#000" stroke-width="1"/>
      <line x1="13" y1="32" x2="35" y2="32" stroke="#000" stroke-width="1"/>
      <line x1="16" y1="24" x2="32" y2="40" stroke="#000" stroke-width="1"/>
      <line x1="16" y1="40" x2="32" y2="24" stroke="#000" stroke-width="1"/>
      <rect x="30" y="175" width="60" height="8" rx="3" fill="#000"/>
    </svg>
  </div>
  <div class="drink-name">Mojito</div>
  <div class="underline-deco">
    <span class="long"></span><span class="dot"></span><span class="short"></span>
  </div>
  <div class="ingredients">Rum &middot; Lime &middot; Mint &middot; Soda</div>
  <div class="bottom-rule"></div>
</div>

<div class="divider"></div>

<!-- APEROL SPRITZ -->
<div class="panel">

      <rect x="68" y="100" width="18" height="15" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>
      <circle cx="114" cy="36" r="16" fill="#fff" stroke="#000" stroke-width="2.5"/>
      <line x1="114" y1="20" x2="114" y2="52" stroke="#000" stroke-width="1.2"/>
      <line x1="98" y1="36" x2="130" y2="36" stroke="#000" stroke-width="1.2"/>
      <line x1="102" y1="25" x2="126" y2="47" stroke="#000" stroke-width="1.2"/>

      <circle cx="114" cy="36" r="12" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>

      <rect x="60" y="128" width="10" height="40" fill="#000" rx="2"/>

      <line x1="42" y1="24" x2="54" y2="128" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="drink-name long">Aperol Spritz</div>
  <div class="underline-deco">
    <span class="short"></span><span class="dot"></span><span class="long"></span>
  </div>
  <div class="ingredients">Aperol &middot; Prosecco &middot; Soda</div>
  <div class="bottom-rule"></div>
</div>

</body>
</html>
